<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .btn { background: #238636; color: white; border: none; padding: 10px; border-radius: 6px; width: 100%; cursor: pointer; }
        .xp-bar { background: #30363d; height: 8px; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .xp-fill { background: #58a6ff; height: 100%; width: 30%; }
    </style>
</head>
<body>
    <h2>Герой: <span id="user-name">Загрузка...</span></h2>
    <div class="card">
        <p>Уровень <span id="lvl">1</span></p>
        <div class="xp-bar"><div id="xp-fill" class="xp-fill"></div></div>
    </div>

    <div id="habits-list">
        <p>Привычки загружаются...</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        // Получаем имя пользователя из Telegram
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "Странник";

        // Функция, которую мы вызовем позже для отрисовки привычек
        function renderHabits(habits) {
            const list = document.getElementById('habits-list');
            list.innerHTML = '';
            habits.forEach(h => {
                list.innerHTML += `
                    <div class="card">
                        <h3>${h.name}</h3>
                        <p>Стрик: ${h.streak} 🔥</p>
                        <button class="btn" onclick="done('${h.id}')">Выполнить</button>
                    </div>`;
            });
        }
        
        function done(id) {
            tg.sendData("done_" + id); // Отправляем боту сигнал, что привычка выполнена
        }
    </script>
</body>
</html>
