<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitQuest RPG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-color: #58a6ff;
            --text-color: #c9d1d9;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .profile-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #30363d;
            margin-bottom: 20px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }
        .btn-action {
            background-color: #238636;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <h2 id="user-name">Загрузка героя...</h2>
        <div class="stats">
            <div>🏅 LVL: <span id="level">1</span></div>
            <div>✨ XP: <span id="xp">0</span></div>
        </div>
    </div>

    <div class="profile-card">
        <h3>🎯 Твоя задача на сегодня:</h3>
        <p>Выполнить все привычки и стать сильнее!</p>
        <button class="btn-action" onclick="sendDone()">✅ ОТМЕТИТЬ ВСЁ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран
        
        // Отображаем имя пользователя из Telegram
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
        }

        function sendDone() {
            tg.sendData("all_habits_done"); // Отправляем сигнал боту
        }
    </script>
</body>
</html>
